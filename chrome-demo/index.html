<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Gemini Nano — Chrome Prompt API Demo</title>
  <style>
    body { font-family: monospace; max-width: 720px; margin: 40px auto; padding: 0 20px; background: #0d1117; color: #e6edf3; }
    h1 { color: #58a6ff; }
    #status { padding: 8px 12px; border-radius: 4px; margin-bottom: 16px; font-size: 0.85em; }
    .ok { background: #1a3a1a; color: #56d364; }
    .err { background: #3a1a1a; color: #f85149; }
    .warn { background: #3a2a0a; color: #d29922; }
    textarea { width: 100%; box-sizing: border-box; background: #161b22; color: #e6edf3; border: 1px solid #30363d; border-radius: 4px; padding: 10px; font-family: monospace; font-size: 0.9em; }
    button { background: #238636; color: #fff; border: none; padding: 8px 20px; border-radius: 4px; cursor: pointer; margin-top: 8px; }
    button:disabled { background: #333; cursor: not-allowed; }
    #output { margin-top: 16px; white-space: pre-wrap; background: #161b22; border: 1px solid #30363d; border-radius: 4px; padding: 12px; min-height: 60px; }
  </style>
</head>
<body>
  <h1>Gemini Nano — Chrome Prompt API</h1>
  <div id="status" class="warn">Checking availability…</div>

  <textarea id="prompt" rows="4" placeholder="Enter your prompt here…">Explain what a neural network is in one sentence.</textarea>
  <br />
  <button id="run" disabled>Run prompt</button>

  <div id="output"></div>

  <script>
    const statusEl = document.getElementById('status');
    const outputEl = document.getElementById('output');
    const runBtn   = document.getElementById('run');
    const promptEl = document.getElementById('prompt');

    async function init() {
      // Chrome 127+ exposes window.ai with the Prompt API
      if (!('ai' in window) || !('languageModel' in window.ai)) {
        statusEl.className = 'err';
        statusEl.textContent = '✗ window.ai not available. See setup instructions in SETUP.md.';
        return;
      }

      const caps = await window.ai.languageModel.capabilities();
      if (caps.available === 'no') {
        statusEl.className = 'err';
        statusEl.textContent = '✗ Gemini Nano not available on this device (hardware/flags issue).';
        return;
      }
      if (caps.available === 'after-download') {
        statusEl.className = 'warn';
        statusEl.textContent = '⟳ Model is downloading in the background — try again in a few minutes.';
        return;
      }
      statusEl.className = 'ok';
      statusEl.textContent = '✓ Gemini Nano ready.';
      runBtn.disabled = false;
    }

    runBtn.addEventListener('click', async () => {
      runBtn.disabled = true;
      outputEl.textContent = 'Thinking…';
      try {
        const session = await window.ai.languageModel.create();
        const stream  = session.promptStreaming(promptEl.value);
        outputEl.textContent = '';
        for await (const chunk of stream) {
          outputEl.textContent = chunk;
        }
        session.destroy();
      } catch (e) {
        outputEl.textContent = 'Error: ' + e.message;
      }
      runBtn.disabled = false;
    });

    init();
  </script>
</body>
</html>
